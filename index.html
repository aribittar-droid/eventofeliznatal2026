document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\"display:flex;flex-direction:column;align-items:center;text-align:center;padding:0.5rem 0;animation:fadeInUp 0.5s cubic-bezier(0.4,0,0.2,1) forwards;\">\n            <div style=\"width:72px;height:72px;border-radius:50px;background:rgba(31,107,74,0.2);color:#2ecc71;display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem;\">\n              <svg sc-camel-view-box=\"0 0 24 24\" width=\"42\" height=\"42\"><path fill=\"currentColor\" d=\"M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <h3 style=\"font-family:'Outfit',sans-serif;font-size:1.4rem;color:#ffffff;margin:0 0 0.8rem;\">Presenca Confirmada com Sucesso!<\u002Fh3>\n            <p style=\"font-size:0.95rem;color:#a0b5ab;line-height:1.6;margin:0 0 2rem;max-width:400px;\">Obrigado por confirmar, {{ rsvpName }}. Esperamos voce no dia 17/08/2026 as 19:00.<\u002Fp>\n            <div style=\"display:flex;flex-direction:column;gap:1rem;width:100%;max-width:320px;\">\n              <a href=\"{{ whatsappLink }}\" target=\"_blank\" rel=\"noopener\" style=\"background:#25d366;color:white;padding:0.9rem;border-radius:12px;font-weight:600;font-size:0.9rem;display:flex;align-items:center;justify-content:center;gap:0.5rem;\">\n                <svg sc-camel-view-box=\"0 0 24 24\" width=\"16\" height=\"16\"><path fill=\"currentColor\" d=\"M12.04 2c-5.46 0-9.91 4.45-9.91 9.91 0 1.75.46 3.45 1.32 4.95L2.05 22l5.25-1.38c1.45.79 3.08 1.21 4.74 1.21 5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.01A9.81 9.81 0 0 0 12.04 2z\"><\u002Fpath><\u002Fsvg>\n                <span>Enviar Confirmacao via WhatsApp<\u002Fspan>\n              <\u002Fa>\n              <button type=\"button\" sc-camel-on-click=\"{{ resetRsvp }}\" style=\"background:transparent;border:1px solid rgba(255,255,255,0.15);color:#a0b5ab;padding:0.8rem;border-radius:12px;cursor:pointer;font-size:0.85rem;font-weight:500;\">Alterar Dados<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n          <div>\n            <h2 style=\"font-family:'Outfit',sans-serif;font-size:1.65rem;font-weight:700;color:#ffffff;margin:0 0 0.5rem;\">Confirme sua Presenca<\u002Fh2>\n            <p style=\"font-size:0.95rem;color:#a0b5ab;margin:0 0 2rem;line-height:1.5;\">Garanta a sua vaga neste encontro exclusivo preenchendo os dados abaixo:<\u002Fp>\n            <form sc-camel-on-submit=\"{{ handleSubmit }}\" style=\"display:flex;flex-direction:column;gap:1.2rem;\">\n              <div style=\"display:flex;flex-direction:column;gap:0.5rem;\">\n                <label style=\"font-size:0.85rem;font-weight:600;color:#f4eae1;letter-spacing:0.5px;\">Nome Completo<\u002Flabel>\n                <input type=\"text\" required=\"true\" placeholder=\"Digite seu nome completo\" value=\"{{ rsvpName }}\" sc-camel-on-change=\"{{ handleNameChange }}\" style=\"background:rgba(0,0,0,0.08);border:1px solid rgba(255,255,255,0.08);color:#ffffff;padding:0.9rem 1.1rem;border-radius:12px;font-family:'Inter',sans-serif;font-size:0.95rem;outline:none;width:100%;\">\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:0.5rem;\">\n                <label style=\"font-size:0.85rem;font-weight:600;color:#f4eae1;letter-spacing:0.5px;\">Telefone / WhatsApp<\u002Flabel>\n                <input type=\"tel\" required=\"true\" placeholder=\"(66) 99999-9999\" value=\"{{ rsvpPhone }}\" sc-camel-on-change=\"{{ handlePhoneChange }}\" style=\"background:rgba(0,0,0,0.08);border:1px solid rgba(255,255,255,0.08);color:#ffffff;padding:0.9rem 1.1rem;border-radius:12px;font-family:'Inter',sans-serif;font-size:0.95rem;outline:none;width:100%;\">\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:0.5rem;\">\n                <label style=\"font-size:0.85rem;font-weight:600;color:#f4eae1;letter-spacing:0.5px;\">Nome da Propriedade / Fazenda<\u002Flabel>\n                <input type=\"text\" required=\"true\" placeholder=\"Ex: Fazenda Progresso\" value=\"{{ rsvpProperty }}\" sc-camel-on-change=\"{{ handlePropertyChange }}\" style=\"background:rgba(0,0,0,0.08);border:1px solid rgba(255,255,255,0.08);color:#ffffff;padding:0.9rem 1.1rem;border-radius:12px;font-family:'Inter',sans-serif;font-size:0.95rem;outline:none;width:100%;\">\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:0.5rem;\">\n                <label style=\"font-size:0.85rem;font-weight:600;color:#f4eae1;letter-spacing:0.5px;\">Acompanhantes (Opcional)<\u002Flabel>\n                <sc-raw-select value=\"{{ rsvpGuests }}\" sc-camel-on-change=\"{{ handleGuestsChange }}\" style=\"background:rgba(0,0,0,0.08);border:1px solid rgba(255,255,255,0.08);color:#ffffff;padding:0.9rem 1.1rem;border-radius:12px;font-family:'Inter',sans-serif;font-size:0.95rem;outline:none;width:100%;\">\n                  <option value=\"0\">Apenas eu<\u002Foption>\n                  <option value=\"1\">Eu + 1 acompanhante<\u002Foption>\n                  <option value=\"2\">Eu + 2 acompanhantes<\u002Foption>\n                  <option value=\"3\">Eu + 3 acompanhantes<\u002Foption>\n                  <option value=\"4\">Mais de 4 pessoas<\u002Foption>\n                <\u002Fsc-raw-select>\n              <\u002Fdiv>\n              <button type=\"submit\" disabled=\"{{ isSubmitting }}\" style=\"background:linear-gradient(135deg,#d4af37 0%,#bda230 100%);color:#071911;border:none;padding:1.1rem;border-radius:12px;font-family:'Outfit',sans-serif;font-size:1.05rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:0.8rem;margin-top:0.5rem;box-shadow:0 8px 20px rgba(212,175,55,0.2);\">\n                <sc-if value=\"{{ isSubmitting }}\" hint-placeholder-val=\"{{ false }}\">\n                  <svg sc-camel-view-box=\"0 0 24 24\" width=\"18\" height=\"18\" style=\"animation:spin 1s linear infinite;\"><path fill=\"currentColor\" d=\"M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z\"><\u002Fpath><\u002Fsvg>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ notSubmitting }}\" hint-placeholder-val=\"{{ true }}\">\n                  <span>Confirmar Presenca<\u002Fspan>\n                <\u002Fsc-if>\n              <\u002Fbutton>\n            <\u002Fform>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsection>\n\n    <\u002Fmain>\n\n    <footer style=\"width:100%;max-width:640px;padding:2.8rem 1.5rem 2.4rem;text-align:center;display:flex;flex-direction:column;gap:0.5rem;\">\n      <p style=\"font-size:0.8rem;color:rgba(160,181,171,0.45);margin:0;\">© 2026 Inovagro, Lallemand &amp; Verdivo. Todos os direitos reservados.<\u002Fp>\n      <p style=\"font-size:0.75rem;color:rgba(212,175,55,0.4);letter-spacing:0.5px;margin:0;\">Desenvolvido com tecnologia e foco na produtividade da sua lavoura.<\u002Fp>\n    <\u002Ffooter>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:680},&quot;colorTheme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Folha Verde&quot;,&quot;options&quot;:[&quot;Folha Verde&quot;,&quot;El Nino (Oceano)&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Visual&quot;},&quot;showWeatherMap&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Visual&quot;},&quot;whatsappNumber&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;5566999429100&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;RSVP&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    days: '00', hours: '00', minutes: '00', seconds: '00',\n    rsvpName: '', rsvpPhone: '', rsvpProperty: '', rsvpGuests: '0',\n    isSubmitting: false, submitted: false\n  };\n\n  componentDidMount() {\n    this.eventDate = new Date('2026-08-17T19:00:00');\n    this.tick();\n    this._interval = setInterval(this.tick, 1000);\n  }\n\n  componentWillUnmount() {\n    clearInterval(this._interval);\n  }\n\n  tick = () => {\n    const diff = this.eventDate - new Date();\n    if (diff <= 0) {\n      this.setState({ days: '00', hours: '00', minutes: '00', seconds: '00' });\n      return;\n    }\n    const pad = n => String(n).padStart(2, '0');\n    this.setState({\n      days: pad(Math.floor(diff / 86400000)),\n      hours: pad(Math.floor((diff % 86400000) / 3600000)),\n      minutes: pad(Math.floor((diff % 3600000) / 60000)),\n      seconds: pad(Math.floor((diff % 60000) / 1000))\n    });\n  };\n\n  handleNameChange = e => this.setState({ rsvpName: e.target.value });\n  handlePropertyChange = e => this.setState({ rsvpProperty: e.target.value });\n  handleGuestsChange = e => this.setState({ rsvpGuests: e.target.value });\n  handlePhoneChange = e => {\n    const x = e.target.value.replace(/\\D/g, '').match(/(\\d{0,2})(\\d{0,5})(\\d{0,4})/);\n    const formatted = !x[2] ? x[1] : `(${x[1]}) ${x[2]}${x[3] ? '-' + x[3] : ''}`;\n    this.setState({ rsvpPhone: formatted });\n  };\n\n  handleSubmit = e => {\n    e.preventDefault();\n    this.setState({ isSubmitting: true });\n    setTimeout(() => this.setState({ isSubmitting: false, submitted: true }), 1100);\n  };\n\n  resetRsvp = () => this.setState({ submitted: false });\n\n  renderVals() {\n    const guestsMap = { '0': 'Apenas eu', '1': 'Eu + 1 acompanhante', '2': 'Eu + 2 acompanhantes', '3': 'Eu + 3 acompanhantes', '4': 'Mais de 4 pessoas' };\n    const whatsappNumber = this.props.whatsappNumber ?? '5566999429100';\n    const msg = `Ola! Gostaria de confirmar minha presenca no Encontro Tecnico Inovagro sobre \"Gerenciamento de Risco para Anos de El Nino\".\\n\\n*Dados de Confirmacao:*\\nNome: ${this.state.rsvpName}\\nWhatsApp: ${this.state.rsvpPhone}\\nFazenda: ${this.state.rsvpProperty}\\nAcompanhantes: ${guestsMap[this.state.rsvpGuests]}`;\n    const isElNino = (this.props.colorTheme ?? 'Folha Verde') === 'El Nino (Oceano)';\n    return {\n      ...this.state,\n      notSubmitted: !this.state.submitted,\n      notSubmitting: !this.state.isSubmitting,\n      showWeatherMap: !!this.props.showWeatherMap,\n      notShowWeatherMap: !this.props.showWeatherMap,\n      isElNino,\n      notElNino: !isElNino,\n      whatsappLink: `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(msg)}`,\n      handleNameChange: this.handleNameChange,\n      handlePhoneChange: this.handlePhoneChange,\n      handlePropertyChange: this.handlePropertyChange,\n      handleGuestsChange: this.handleGuestsChange,\n      handleSubmit: this.handleSubmit,\n      resetRsvp: this.resetRsvp\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
